name: _probe-adfields (temporary)

# TEMPORARY, manual-only, READ-ONLY probe: are recent Boberdoo leads carrying the
# new Campaign_ID / Ad_ID / Keyword fields populated? Logs to the run only. Writes
# nothing, posts nothing. Delete after use.
on:
  workflow_dispatch:
    inputs:
      scan_window:
        description: "How many recent lead ids to scan"
        required: false
        default: "400"

concurrency:
  group: probe-adfields-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install undici (proxy dispatcher)
        run: npm i undici
      - name: Probe ad fields
        env:
          BOBERDOO_ADMIN_KEY: ${{ secrets.BOBERDOO_ADMIN_KEY }}
          FIXIE_URL: ${{ secrets.FIXIE_URL }}
          SCAN_WINDOW: ${{ github.event.inputs.scan_window }}
        run: node scripts/_probe-adfields.mjs
