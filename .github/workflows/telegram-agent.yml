name: Telegram change request

# Fired by the Vercel webhook (api/telegram.js) via repository_dispatch.
on:
  repository_dispatch:
    types: [telegram-change-request]
  # Lets you test from the GitHub UI without Telegram.
  workflow_dispatch:
    inputs:
      request:
        description: "Change request text"
        required: true
      chat_id:
        description: "Telegram chat id to reply to (optional)"
        required: false

# One change at a time so concurrent requests don't fight over main.
concurrency:
  group: telegram-agent
  cancel-in-progress: false

jobs:
  change:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      # These are project identifiers, not secrets (from .vercel/project.json).
      VERCEL_ORG_ID: team_JRdKsTQV9jopaKxc8wlsdvGz
      VERCEL_PROJECT_ID: prj_LIvg3Gu0WLw6fhgBAivjIojFR4y9
      CHAT_ID: ${{ github.event.client_payload.chat_id || github.event.inputs.chat_id }}
      REQUEST: ${{ github.event.client_payload.request || github.event.inputs.request }}
      FROM: ${{ github.event.client_payload.from || 'manual' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "leosource-bot"
          git config user.email "bot@users.noreply.github.com"

      - name: Download Telegram screenshots
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          PHOTO_FILE_IDS: ${{ toJSON(github.event.client_payload.photo_file_ids) }}
        run: |
          mkdir -p _agent_inbox
          echo "${PHOTO_FILE_IDS:-[]}" > /tmp/ids.json
          count=$(jq 'length // 0' /tmp/ids.json)
          for i in $(seq 0 $((count - 1))); do
            fid=$(jq -r ".[$i]" /tmp/ids.json)
            path=$(curl -s "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/getFile?file_id=$fid" | jq -r '.result.file_path')
            if [ -n "$path" ] && [ "$path" != "null" ]; then
              curl -s -o "_agent_inbox/screenshot_$i.${path##*.}" \
                "https://api.telegram.org/file/bot$TELEGRAM_BOT_TOKEN/$path"
            fi
          done
          ls -la _agent_inbox || true

      - name: Make the change with Claude
        uses: anthropics/claude-code-action@v1
        with:
          # Uses your Claude subscription (run `claude setup-token` to mint this),
          # so changes don't bill per-token against a separate API key.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            A client (${{ env.FROM }}) sent this change request for the static
            marketing site in this repo. Read AGENTS.md first for full project
            context, conventions, and gotchas.

            REQUEST:
            "${{ env.REQUEST }}"

            Any screenshots they attached are in ./_agent_inbox/ — open them as
            images to see exactly what they mean. Red marks usually highlight the
            element to change.

            Make the change directly to the site's HTML/CSS/JS. Keep it minimal,
            match the surrounding code style, and follow AGENTS.md (e.g. forms
            must use method="get"). Do NOT modify or stage anything under
            _agent_inbox/. When finished, `git add` your changed files and
            `git commit` with a short message. Do NOT push or deploy — the
            workflow does that.

            If the request is too ambiguous to act on safely, make NO code
            changes; instead write a single clarifying question to
            ./_agent_inbox/REPLY.txt and stop.
          claude_args: >-
            --allowedTools "Read,Edit,Write,Bash(git add:*),Bash(git commit:*),Bash(git status:*),Bash(git diff:*),Bash(grep:*),Bash(ls:*),Bash(cat:*)"

      - name: Push, deploy, and report back to Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          GH_PUSH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          send() {
            [ -z "$CHAT_ID" ] && { echo "$1"; return; }
            curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg c "$CHAT_ID" --arg t "$1" '{chat_id:$c, text:$t}')" >/dev/null
          }

          # 1) Ambiguous → Claude asked a clarifying question instead of editing.
          if [ -f _agent_inbox/REPLY.txt ]; then
            send "❓ $(cat _agent_inbox/REPLY.txt)"
            exit 0
          fi

          # 2) No new commit → Claude couldn't safely make the change.
          if [ "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)" ]; then
            send "🤔 I couldn't make that change automatically — Eugene will take a look."
            exit 0
          fi

          # 3) Ship it.
          git push "https://x-access-token:${GH_PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main \
            || { send "⚠️ Made the change but couldn't push to GitHub — Eugene will take a look."; exit 1; }

          rm -rf _agent_inbox            # don't deploy the screenshots
          npm i -g vercel >/dev/null 2>&1
          URL=$(vercel deploy --prod --yes --token "$VERCEL_TOKEN" 2>/dev/null | tail -n1)
          COMMIT=$(git log -1 --pretty=%s)
          send "✅ Done — \"$COMMIT\" is live on https://shophealthrates.com"$'\n'"(deploy: $URL)"
