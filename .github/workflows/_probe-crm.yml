name: _probe-crm (temporary)

# TEMPORARY, manual, READ-ONLY: does getLeadDetails expose the per-lead CRM
# disposition status (Closed = enrolled)? Logs only. Delete after use.
on:
  workflow_dispatch:
    inputs:
      probe_ids:
        description: "Optional comma-separated lead ids to inspect (else recent our-source)"
        required: false
        default: ""

concurrency:
  group: probe-crm-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { ref: main }
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Install undici
        run: npm i undici
      - name: Probe CRM status
        env:
          BOBERDOO_ADMIN_KEY: ${{ secrets.BOBERDOO_ADMIN_KEY }}
          FIXIE_URL: ${{ secrets.FIXIE_URL }}
          PROBE_IDS: ${{ github.event.inputs.probe_ids }}
        run: node scripts/_probe-crm.mjs
