name: Lead reconcile (Sheety ↔ Boberdoo)

# Back-fills the Sheety lead log with Boberdoo outcome data (txid / boberdooStatus
# / trustedForm) by matching rows on email, via getLeadDetails through Fixie.
# Idempotent (only empty-txid rows); exact sub_id match only; quota-friendly
# (one Boberdoo call per new row). Cron runs LIVE; manual runs default to dry-run.
on:
  schedule:
    - cron: "7 * * * *"        # hourly at :07
  workflow_dispatch:
    inputs:
      dry_run:
        description: "1 = report only (no writes). Cron always runs live (0)."
        required: false
        default: "1"
      max_reconcile:
        description: "Max rows to reconcile this run"
        required: false
        default: "50"

concurrency:
  group: lead-reconcile
  cancel-in-progress: false

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install undici (proxy dispatcher)
        run: npm i undici

      - name: Reconcile
        env:
          BOBERDOO_ADMIN_KEY: ${{ secrets.BOBERDOO_ADMIN_KEY }}
          FIXIE_URL: ${{ secrets.FIXIE_URL }}
          SHEETY_URL: ${{ secrets.SHEETY_URL }}
          # schedule -> inputs.dry_run is empty -> '0' (LIVE back-fill).
          # manual   -> uses the input (default '1' = dry-run).
          DRY_RUN: ${{ github.event.inputs.dry_run || '0' }}
          MAX_RECONCILE: ${{ github.event.inputs.max_reconcile || '50' }}
        run: node scripts/lead-reconcile.mjs
