name: Telegram investigate

# Free-form data investigation. Fired by api/telegram.js for @mention QUESTIONS that
# must look at the LIVE systems (Boberdoo / ClickFlare / Sheety / Ringba) and reason
# across them — NOT a canned single-system report. READ-ONLY: the agent can run the
# read scripts + node CLIs, but CANNOT edit code, commit, push, or deploy.
#
# If the message turns out to be a SITE-CHANGE request that slipped past the
# isChangeRequest gate in api/telegram.js, the agent writes the HANDOFF:CHANGE
# sentinel to REPLY.txt and the separate `handoff` job (the only job here with
# contents:write) re-dispatches it to the code-change agent (telegram-agent.yml)
# — the client is never bounced to a slash command. repository_dispatch fired
# with the default GITHUB_TOKEN is an explicit exception to GitHub's workflow
# recursion guard, so the dispatch does trigger the change workflow.
#
# mode=lookup → run scripts/lookup.mjs only (deterministic /lookup command, instant).
# mode=llm    → skip the lookup step; claude-code-action investigates with the full
#               tool catalog (uses lookup.mjs as a tool). This is the default for
#               @mention questions ("investigate by default").
#
# Run it (log-only, no Telegram post — leave chat_id blank):
#   gh workflow run "Telegram investigate" -f request="do you see these sales? <id> <id>"
#
# Requires secrets: BOBERDOO_ADMIN_KEY, FIXIE_URL (or VERCEL_TOKEN), CLICKFLARE_USERNAME,
# CLICKFLARE_PASSWORD, SHEETY_URL, RINGBA_API_TOKEN, CLAUDE_CODE_OAUTH_TOKEN, TELEGRAM_BOT_TOKEN.
on:
  repository_dispatch:
    types: [telegram-investigate]
  workflow_dispatch:
    inputs:
      request:
        description: "Question / ids to investigate"
        required: true
      mode:
        description: "llm (default, LLM investigates) | lookup (deterministic id resolver)"
        required: false
        default: "llm"
      chat_id:
        description: "Telegram chat id to reply to (blank = just print to the run log)"
        required: false
      message_id:
        description: "Telegram message id for reactions (optional)"
        required: false

# Allow several investigations in parallel; they don't touch shared state.
concurrency:
  group: telegram-investigate-${{ github.event.client_payload.message_id || github.run_id }}
  cancel-in-progress: false

jobs:
  investigate:
    runs-on: ubuntu-latest
    permissions:
      contents: read       # NEVER write — this agent cannot commit or deploy
      id-token: write      # claude-code-action needs OIDC
    outputs:
      handoff: ${{ steps.detect.outputs.handoff }}
    env:
      CHAT_ID: ${{ github.event.client_payload.chat_id || github.event.inputs.chat_id }}
      MESSAGE_ID: ${{ github.event.client_payload.message_id || github.event.inputs.message_id || '' }}
      REQUEST: ${{ github.event.client_payload.request || github.event.inputs.request }}
      FROM: ${{ github.event.client_payload.from || 'manual' }}
      MODE: ${{ github.event.client_payload.mode || github.event.inputs.mode || 'llm' }}
      # Project identifiers (not secrets) — used to pull FIXIE_URL from Vercel env.
      VERCEL_ORG_ID: team_JRdKsTQV9jopaKxc8wlsdvGz
      VERCEL_PROJECT_ID: prj_LIvg3Gu0WLw6fhgBAivjIojFR4y9
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install undici (proxy dispatcher for native fetch)
        run: npm i undici            # needed by lead-check / reconcile (Boberdoo via Fixie)

      - name: Acknowledge in Telegram
        if: env.CHAT_ID != '' && env.MESSAGE_ID != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/setMessageReaction" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg c "$CHAT_ID" --arg m "$MESSAGE_ID" \
              '{chat_id:$c, message_id:($m|tonumber), reaction:[{type:"emoji",emoji:"👀"}]}')" >/dev/null || true

      # FIXIE_URL — repo secret, else pulled from Vercel env. VERBATIM from
      # telegram-reconcile.yml / telegram-lead-check.yml.
      - name: Resolve FIXIE_URL
        env:
          GH_FIXIE_URL: ${{ secrets.FIXIE_URL }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          url="$GH_FIXIE_URL"
          if [ -z "$url" ] && [ -n "$VERCEL_TOKEN" ]; then
            npm i -g vercel >/dev/null 2>&1 || true
            vercel env pull /tmp/v.env --yes --environment=production --token "$VERCEL_TOKEN" >/dev/null 2>&1 || true
            if [ -f /tmp/v.env ]; then
              url=$(grep -E '^FIXIE_URL=' /tmp/v.env | head -1 | cut -d= -f2- | sed 's/^"//; s/"$//')
              rm -f /tmp/v.env
            fi
          fi
          if [ -n "$url" ]; then
            echo "::add-mask::$url"; echo "FIXIE_URL=$url" >> "$GITHUB_ENV"
            echo "FIXIE_URL resolved (length ${#url})."
          else
            echo "::warning::FIXIE_URL not resolved — live Boberdoo lookups unavailable."
          fi

      # ── mode=lookup: deterministic id resolver (no LLM). Writes REPLY.txt if it
      #    finds an id/email/name: token; otherwise writes nothing → the LLM step runs.
      - name: Deterministic lookup (ClickFlare + Sheety)
        if: env.MODE == 'lookup'
        id: lookup
        continue-on-error: true
        env:
          SHEETY_URL: ${{ secrets.SHEETY_URL }}
          CLICKFLARE_USERNAME: ${{ secrets.CLICKFLARE_USERNAME }}
          CLICKFLARE_PASSWORD: ${{ secrets.CLICKFLARE_PASSWORD }}
          CLICKFLARE_ORG_ID: ${{ secrets.CLICKFLARE_ORG_ID }}
        run: node scripts/lookup.mjs      # reads REQUEST from job env

      # ── mode=ad: deterministic keyword/campaign ranking (no LLM). Boberdoo via Fixie.
      - name: Deterministic ad-attribution report
        if: env.MODE == 'ad'
        id: adreport
        continue-on-error: true
        env:
          BOBERDOO_ADMIN_KEY: ${{ secrets.BOBERDOO_ADMIN_KEY }}
          FIXIE_URL: ${{ env.FIXIE_URL }}
        run: node scripts/ad-report.mjs      # reads REQUEST from job env

      # ── LLM investigation — runs unless a deterministic step already answered.
      - name: Investigate with Claude
        if: hashFiles('_agent_inbox/REPLY.txt') == ''
        uses: anthropics/claude-code-action@v1
        env:
          BOBERDOO_ADMIN_KEY: ${{ secrets.BOBERDOO_ADMIN_KEY }}
          FIXIE_URL: ${{ env.FIXIE_URL }}
          CLICKFLARE_USERNAME: ${{ secrets.CLICKFLARE_USERNAME }}
          CLICKFLARE_PASSWORD: ${{ secrets.CLICKFLARE_PASSWORD }}
          CLICKFLARE_ORG_ID: ${{ secrets.CLICKFLARE_ORG_ID }}
          SHEETY_URL: ${{ secrets.SHEETY_URL }}
          RINGBA_API_TOKEN: ${{ secrets.RINGBA_API_TOKEN }}
          RINGBA_ACCOUNT_ID: ${{ secrets.RINGBA_ACCOUNT_ID }}
          # TELEGRAM_BOT_TOKEN is deliberately withheld — the agent must not message
          # arbitrary chats. The Report step owns the reply.
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: >-
            --max-turns 30
            --allowedTools "Read,Write,Bash(node scripts/lookup.mjs:*),Bash(node scripts/sales-report.mjs:*),Bash(node scripts/ad-report.mjs:*),Bash(node scripts/lead-check-api.mjs:*),Bash(node scripts/lead-reconcile-report.mjs:*),Bash(node scripts/call-check-api.mjs:*),Bash(node scripts/clickflare-api.mjs:*),Bash(cat:*),Bash(ls:*),Bash(grep:*)"
          prompt: |
            You are a READ-ONLY data investigator running headless in CI for the LeoSource
            Insurance Telegram group. A teammate (${{ env.FROM }}) asked a question that needs
            you to look at the LIVE data systems and reason across them — NOT fire a canned
            report. Read AGENTS.md first for project context.

            THEIR MESSAGE:
            "${{ env.REQUEST }}"

            You CANNOT edit code, commit, push, or deploy — and you don't need to. Your only
            job is to INVESTIGATE and write one clear answer. If the message is actually a
            request to CHANGE the website (build/create/edit/remove something on the site),
            do NOT attempt it and do NOT tell them to use /change — write exactly the single
            line HANDOFF:CHANGE as the ONLY content of ./_agent_inbox/REPLY.txt and stop;
            the workflow hands the original message to the code-change agent automatically.

            ── HOW TO RUN TOOLS (important): credentials AND the teammate's message are
               ALREADY in your shell env (the message is in $REQUEST). Run each script as
               `node scripts/<name>.mjs [args]`. Arguments AFTER the script name are fine, but
               NEVER prefix a command with `REQUEST=...`, `cd`, `export`, or any env var — those
               are blocked by the tool allowlist and will fail. The window/intent scripts
               (sales-report, ad-report) read $REQUEST, so run them with NO args at all. NEVER
               print env values.

            ── YOUR TOOLS (each reads live data):
            • node scripts/lookup.mjs <id1> <id2> … | <email> | name:<first name>
                Resolve specific ClickFlare click_ids / Boberdoo Sub_IDs / emails — or a
                person's FIRST NAME (e.g. `name:kevin`) via the Sheety lead + enrollment
                log — across ClickFlare conversions + the Sheety log → per-id verdict
                (matched $50 / unmatched $0 / not found); a name hit also reports the
                row's email, phone last-4 and click_id. USE THIS FIRST whenever ids are
                pasted or a person is referenced by first name.
            • node scripts/sales-report.mjs            (window + intent read from the message env)
                "How many sales / how much revenue" for today/yesterday/7d/30d/a date:
                Sheety submitted·matched·unmatched counts + ClickFlare revenue. If the
                question asks WHICH / WHO / clients / names / emails, it also appends an
                exact per-client roster. This is the AUTHORITATIVE sales tool.
            • node scripts/ad-report.mjs               (window read from the message env)
                "Keyword/campaign performance" — per keyword & per campaign_id: LEADS, SOLD
                (Matched) and SHARE of sales %, over a window (overall sell-through is ~100%
                — almost every lead matches). AUTHORITATIVE for any keyword/campaign question
                incl. rates/shares; quote it verbatim. (Boberdoo is the only source.)
            • node scripts/lead-reconcile-report.mjs
                "Why N in Boberdoo but M in ClickFlare?" — 3-way diff bucketed into
                cpid-fallback / no-click_id / genuine-miss, plus Google-Ads postback fails.
            • node scripts/lead-check-api.mjs          (email / phone / "lead <id>" / "last lead")
                Boberdoo getLeadDetails: lead_status, TrustedForm, TCPA, LeadiD. The ONLY
                source of per-lead Boberdoo fields. Routes through the Fixie static IP.
            • node scripts/call-check-api.mjs          (optional phone filter in the message)
                Verify a phone-call conversion end-to-end (Ringba pixel-fire 200 + ClickFlare).
            • node scripts/clickflare-api.mjs conversions [YYYY-MM-DD]
              node scripts/clickflare-api.mjs postbacks   [YYYY-MM-DD]
                Raw ClickFlare conversion / outbound-postback rows for one day.
            (Reminder: run bare — e.g. `node scripts/ad-report.mjs` — never `REQUEST=… node …`.)

            ── DATA MODEL (cite the SYSTEM each fact comes from in your answer):
            • REVENUE lives only in ClickFlare (ConversionPayout): $50 per MATCHED lead, $0 for
              unmatched. Boberdoo's read API exposes NO per-lead price.
            • A "sale" = Boberdoo lead_status Matched = a paid ($50) ClickFlare conversion.
            • Boberdoo Sub_ID = the ClickFlare click_id TRUNCATED to 30 chars — match on the
              first 30 characters, never a full 36-char exact compare.
            • The Sheety `payout` column is ALWAYS empty — never quote revenue from Sheety.
              Sheety DOES carry the full clickId, the reconciled boberdooStatus, and txid.
            • click_id ≠ cpid (cpid is ClickFlare's CampaignID, not a click id) — expected.
            • U65 phone-call targets pay $0 by design — $0 there does NOT mean "no conversion".
            • Google-Ads attribution lives in Boberdoo custom fields campaign_id / ad_id /
              keyword (only on leads from 2026-06-29 onward; only Boberdoo has them). For
              RANKINGS use ad-report.mjs; for ONE lead's campaign/keyword use lead-check-api.
            • The bot's "🎉 Enrollment (SALE)" pings in the chat come from Sheety
              event=enrollment rows (first name, phone last-4, resolved click_id, email).
              A question naming a person ("what's Kevin's phone number?"), often sent right
              after such a ping, IS answerable: `node scripts/lookup.mjs name:kevin` finds
              the row, then `node scripts/lead-check-api.mjs <their email>` returns the
              FULL phone from Boberdoo (Sheety keeps last-4 only). Never reply that names
              can't be searched.

            ── METHOD:
            1. If the message has pasted ids, run lookup.mjs on them FIRST.
            2. For ANY question about sales / revenue / "how many sold" / "which clients /
               who / names / emails", run `node scripts/sales-report.mjs` and quote its
               numbers and client roster EXACTLY. NEVER hand-count conversions, sum payouts,
               or assemble a client list yourself — sales-report.mjs is authoritative.
            3. For keyword/campaign questions — "top keywords/campaigns", "which keyword
               converts best", "sales RATE / conversion rate by keyword or campaign" — run
               `node scripts/ad-report.mjs` and quote it EXACTLY; never tally yourself. For
               ONE lead's campaign/keyword, run lead-check-api.mjs.
            4. Otherwise choose the tool(s) that answer the question; run them; read the output.
            5. If two systems disagree, say so and explain the gap (lead-reconcile-report).
            6. NEVER answer "I can't query that" — you have the tools and credentials above. If
               a tool errors, say which system failed and what you DID learn; never invent data.

            ── OUTPUT: write a SHORT, plain-text answer (no markdown headers, Telegram-friendly,
               ≤ 15 lines) to ./_agent_inbox/REPLY.txt. Lead with the direct answer, then the
               supporting facts, citing the system each came from (e.g. "ClickFlare: $50 payout",
               "Boberdoo: Matched", "Sheety: boberdooStatus=matched"). Then stop.

      # The LLM writes HANDOFF:CHANGE when the message is really a site-change request;
      # the `handoff` job (contents:write) then re-dispatches it to telegram-agent.yml.
      - name: Detect change-request handoff
        id: detect
        if: always()
        run: |
          if [ -f _agent_inbox/REPLY.txt ] && [ "$(head -1 _agent_inbox/REPLY.txt | tr -d '\r')" = "HANDOFF:CHANGE" ]; then
            echo "handoff=true" >> "$GITHUB_OUTPUT"
          else
            echo "handoff=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Report result
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          echo "================== INVESTIGATE RESULT =================="
          echo "mode: $MODE · lookup outcome: ${{ steps.lookup.outcome }}"
          if [ -f _agent_inbox/REPLY.txt ]; then echo "----- REPLY -----"; cat _agent_inbox/REPLY.txt
          else echo "(no REPLY.txt written)"; fi
          echo "======================================================="
          if [ "${{ steps.detect.outputs.handoff }}" = "true" ]; then
            echo "Change request detected — the handoff job dispatches the code agent."
            [ -z "$CHAT_ID" ] && exit 0
            curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg c "$CHAT_ID" --arg t "🔧 On it — that's a site change, routing it to the code agent now. It will build it and report back here." '{chat_id:$c,text:$t}')" >/dev/null || true
            exit 0
          fi
          [ -z "$CHAT_ID" ] && exit 0
          if [ -f _agent_inbox/REPLY.txt ] && [ -s _agent_inbox/REPLY.txt ]; then
            curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg c "$CHAT_ID" --arg t "$(cat _agent_inbox/REPLY.txt)" '{chat_id:$c,text:$t}')" >/dev/null || true
          else
            curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg c "$CHAT_ID" --arg t "🤔 I couldn't complete that investigation automatically — Eugene will check the run logs." '{chat_id:$c,text:$t}')" >/dev/null || true
          fi

  # Re-dispatch a mis-routed site-change request to the code-change agent
  # (telegram-agent.yml). Separate job on purpose: it is the ONLY place in this
  # workflow with contents:write, and it runs no LLM — the investigate job above
  # stays strictly read-only.
  handoff:
    needs: investigate
    if: needs.investigate.outputs.handoff == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write      # creating a repository_dispatch event requires it
    env:
      CHAT_ID: ${{ github.event.client_payload.chat_id || github.event.inputs.chat_id || '' }}
      MESSAGE_ID: ${{ github.event.client_payload.message_id || github.event.inputs.message_id || '' }}
      REQUEST: ${{ github.event.client_payload.request || github.event.inputs.request }}
      FROM: ${{ github.event.client_payload.from || 'manual' }}
    steps:
      - name: Dispatch the code-change agent
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          jq -n --arg r "$REQUEST" --arg c "$CHAT_ID" --arg m "$MESSAGE_ID" --arg f "$FROM" \
            '{event_type:"telegram-change-request", client_payload:{request:$r, mode:"change", chat_id:$c, message_id:$m, from:$f}}' > /tmp/payload.json
          curl -sf -X POST "https://api.github.com/repos/${{ github.repository }}/dispatches" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -d @/tmp/payload.json
          echo "Dispatched telegram-change-request for: $REQUEST"
