name: Telegram lead check

# TEST-FIRST scaffold. Manual trigger only for now — NOT yet wired to Telegram
# via repository_dispatch. Confirms whether CI can read leads from Boberdoo's
# admin API (getLeadDetails).
#
# getLeadDetails is a Boberdoo "sensitive" function that REQUIRES an IP allowlist,
# and hosted runners have no fixed IP — so the call is routed through Fixie (a
# static-IP proxy) whose IP is whitelisted on the admin key. FIXIE_URL is taken
# from a repo secret, else pulled from the Vercel project env (same pattern as
# telegram-call-check.yml's RINGBA_TOTP_SECRET).
#
# Run it:  gh workflow run "Telegram lead check" -f request="lead 17232849"
#
# Requires: secret BOBERDOO_ADMIN_KEY (read-only key), and FIXIE_URL (secret or
# Vercel env). The "Egress IP" step prints Fixie's static IP — whitelist it on
# the key's "Restrict Only These Functions With This Allowed IP List" box.
on:
  # Fired by the Vercel webhook (api/telegram.js) for Boberdoo/TrustedForm lead
  # questions, e.g. "@bot does the last lead have TrustedForm?".
  repository_dispatch:
    types: [telegram-lead-check]
  workflow_dispatch:
    inputs:
      request:
        description: "Ask (e.g. 'last lead trustedform', an email, a phone, or 'lead <id>')."
        required: false
        default: "last lead trustedform"
      chat_id:
        description: "Telegram chat id to reply to (blank = just print to the run log)"
        required: false
      message_id:
        description: "Telegram message id for a reaction (optional)"
        required: false

concurrency:
  group: telegram-lead-check-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      CHAT_ID: ${{ github.event.client_payload.chat_id || github.event.inputs.chat_id }}
      MESSAGE_ID: ${{ github.event.client_payload.message_id || github.event.inputs.message_id }}
      REQUEST: ${{ github.event.client_payload.request || github.event.inputs.request }}
      # Project identifiers (not secrets), used to pull FIXIE_URL from Vercel env.
      VERCEL_ORG_ID: team_JRdKsTQV9jopaKxc8wlsdvGz
      VERCEL_PROJECT_ID: prj_LIvg3Gu0WLw6fhgBAivjIojFR4y9
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install undici (proxy dispatcher for native fetch)
        run: npm i undici

      # FIXIE_URL: prefer a repo secret; otherwise pull from the Vercel project
      # env using VERCEL_TOKEN (so no one has to copy it into GitHub by hand).
      - name: Resolve FIXIE_URL
        env:
          GH_FIXIE_URL: ${{ secrets.FIXIE_URL }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          url="$GH_FIXIE_URL"
          if [ -z "$url" ] && [ -n "$VERCEL_TOKEN" ]; then
            npm i -g vercel >/dev/null 2>&1 || true
            vercel pull --yes --environment=production --token "$VERCEL_TOKEN" >/dev/null 2>&1 || true
            vercel env pull /tmp/v.env --yes --environment=production --token "$VERCEL_TOKEN" >/dev/null 2>&1 || true
            if [ -f /tmp/v.env ]; then
              url=$(grep -E '^FIXIE_URL=' /tmp/v.env | head -1 | cut -d= -f2- | sed 's/^"//; s/"$//')
              rm -f /tmp/v.env
            fi
          fi
          if [ -n "$url" ]; then
            echo "::add-mask::$url"
            echo "FIXIE_URL=$url" >> "$GITHUB_ENV"
            echo "FIXIE_URL resolved (length ${#url})."
          else
            echo "::warning::FIXIE_URL not resolved — the lead call will go direct and will be rejected by the IP whitelist."
          fi

      - name: Egress IP (direct vs through Fixie — whitelist the Fixie IP)
        run: |
          echo "Direct runner IP (NOT whitelistable — rotating Azure):"
          curl -s https://api.ipify.org; echo
          if [ -n "$FIXIE_URL" ]; then
            echo "Static IP via Fixie (whitelist THIS on the Boberdoo key):"
            for i in 1 2 3; do curl -s -x "$FIXIE_URL" https://api.ipify.org; echo; done | sort -u
          else
            echo "(FIXIE_URL unset — cannot show static IP)"
          fi

      - name: Lead check (Boberdoo getLeadDetails via Fixie)
        id: leadcheck
        continue-on-error: true
        env:
          BOBERDOO_ADMIN_KEY: ${{ secrets.BOBERDOO_ADMIN_KEY }}
          FIXIE_URL: ${{ env.FIXIE_URL }}
        run: node scripts/lead-check-api.mjs

      - name: Report result
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          echo "=================== LEAD CHECK RESULT ==================="
          echo "script outcome: ${{ steps.leadcheck.outcome }}"
          if [ -f _agent_inbox/REPLY.txt ]; then
            echo "----- REPLY -----"
            cat _agent_inbox/REPLY.txt
          else
            echo "(no REPLY.txt was written)"
          fi
          echo "========================================================"

          # Optional Telegram reply — only if a chat_id was provided (off by default).
          if [ -n "$CHAT_ID" ] && [ -f _agent_inbox/REPLY.txt ]; then
            curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg c "$CHAT_ID" --arg t "$(cat _agent_inbox/REPLY.txt)" '{chat_id:$c, text:$t}')" >/dev/null || true
          fi
